# Fly.io configuration for ContextOS

app = "contextos"
primary_region = "sjc"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  PORT = "8006"
  DATABASE_MODE = "fly"

[http_service]
  internal_port = 8006
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# PostgreSQL database
[[services]]
  internal_port = 5432
  protocol = "tcp"
  services = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# Redis cache
[[services]]
  internal_port = 6379
  protocol = "tcp"
  services = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
