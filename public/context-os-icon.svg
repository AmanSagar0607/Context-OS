<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="url(#bgGradient)" rx="24"/>
  
  <!-- Icon: Brain/Memory representation -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.7"/>
    
    <!-- Inner brain/memory nodes -->
    <circle cx="-15" cy="-15" r="10" fill="url(#iconGradient)" opacity="0.9"/>
    <circle cx="15" cy="-15" r="10" fill="url(#iconGradient)" opacity="0.9"/>
    <circle cx="0" cy="12" r="10" fill="url(#iconGradient)" opacity="0.9"/>
    <circle cx="-28" cy="3" r="7" fill="#6366f1" opacity="0.7"/>
    <circle cx="28" cy="3" r="7" fill="#6366f1" opacity="0.7"/>
    <circle cx="0" cy="-28" r="7" fill="#6366f1" opacity="0.7"/>
    
    <!-- Connection lines -->
    <line x1="-15" y1="-15" x2="15" y2="-15" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="-15" x2="0" y2="12" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="12" x2="-15" y2="-15" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
    <line x1="-28" y1="3" x2="-15" y2="-15" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="28" y1="3" x2="15" y2="-15" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-28" x2="-15" y2="-15" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-28" x2="15" y2="-15" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
  </g>
  
  <!-- Text: C (for Context) -->
  <text x="64" y="115" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="url(#accentGradient)" text-anchor="middle" letter-spacing="1">
    CTX
  </text>
</svg>