<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#0f172a" rx="12"/>
  
  <!-- Icon: Brain/Memory representation -->
  <g transform="translate(60, 100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#gradient)" stroke-width="3" opacity="0.6"/>
    
    <!-- Inner brain/memory nodes -->
    <circle cx="-20" cy="-20" r="12" fill="url(#iconGradient)" opacity="0.9"/>
    <circle cx="20" cy="-20" r="12" fill="url(#iconGradient)" opacity="0.9"/>
    <circle cx="0" cy="15" r="12" fill="url(#iconGradient)" opacity="0.9"/>
    <circle cx="-35" cy="5" r="8" fill="#6366f1" opacity="0.7"/>
    <circle cx="35" cy="5" r="8" fill="#6366f1" opacity="0.7"/>
    <circle cx="0" cy="-35" r="8" fill="#6366f1" opacity="0.7"/>
    
    <!-- Connection lines -->
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="-20" x2="0" y2="15" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="15" x2="-20" y2="-20" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-35" y1="5" x2="-20" y2="-20" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="5" x2="20" y2="-20" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-35" x2="-20" y2="-20" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-35" x2="20" y2="-20" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
  </g>
  
  <!-- Text: Context OS -->
  <text x="150" y="85" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">
    Context
  </text>
  <text x="370" y="85" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="url(#gradient)" letter-spacing="-1">
    OS
  </text>
  
  <!-- Tagline -->
  <text x="150" y="125" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#94a3b8" font-weight="400">
    Context Infrastructure for AI Agents
  </text>
  
  <!-- Version badge -->
  <rect x="150" y="145" width="60" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="180" y="161" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#22c55e" font-weight="500" text-anchor="middle">
    v0.1.0
  </text>
  
  <!-- GitHub stars -->
  <rect x="225" y="145" width="100" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="275" y="161" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#f59e0b" font-weight="500" text-anchor="middle">
    ★ GitHub
  </text>
</svg>