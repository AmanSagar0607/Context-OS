<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5865F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7289DA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - Discord blurple -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="128"/>
  
  <!-- Brain/Memory Network Icon -->
  <g transform="translate(256, 240)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    
    <!-- Main nodes -->
    <circle cx="-50" cy="-50" r="28" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="50" cy="-50" r="28" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="0" cy="40" r="28" fill="url(#iconGradient)" opacity="0.95"/>
    
    <!-- Secondary nodes -->
    <circle cx="-90" cy="10" r="18" fill="rgba(255,255,255,0.7)"/>
    <circle cx="90" cy="10" r="18" fill="rgba(255,255,255,0.7)"/>
    <circle cx="0" cy="-90" r="18" fill="rgba(255,255,255,0.7)"/>
    
    <!-- Connection lines -->
    <line x1="-50" y1="-50" x2="50" y2="-50" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <line x1="50" y1="-50" x2="0" y2="40" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    <line x1="0" y1="40" x2="-50" y2="-50" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    
    <line x1="-90" y1="10" x2="-50" y2="-50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="90" y1="10" x2="50" y2="-50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="0" y1="-90" x2="-50" y2="-50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="0" y1="-90" x2="50" y2="-50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  </g>
  
  <!-- Text: CTX -->
  <text x="256" y="420" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="8">
    CTX
  </text>
</svg>