<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#grid)"/>
  
  <!-- Decorative glow effects -->
  <circle cx="150" cy="150" r="250" fill="#6366f1" opacity="0.02"/>
  <circle cx="1050" cy="150" r="250" fill="#a855f7" opacity="0.02"/>
  
  <!-- Icon: Brain/Memory representation -->
  <g transform="translate(180, 150)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>
    
    <!-- Inner brain/memory nodes -->
    <circle cx="-25" cy="-25" r="14" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="25" cy="-25" r="14" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="0" cy="20" r="14" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="-45" cy="5" r="9" fill="#818cf8" opacity="0.75"/>
    <circle cx="45" cy="5" r="9" fill="#818cf8" opacity="0.75"/>
    <circle cx="0" cy="-45" r="9" fill="#818cf8" opacity="0.75"/>
    
    <!-- Connection lines -->
    <line x1="-25" y1="-25" x2="25" y2="-25" stroke="#a5b4fc" stroke-width="2" opacity="0.7"/>
    <line x1="25" y1="-25" x2="0" y2="20" stroke="#a5b4fc" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="20" x2="-25" y2="-25" stroke="#a5b4fc" stroke-width="2" opacity="0.7"/>
    <line x1="-45" y1="5" x2="-25" y2="-25" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="5" x2="25" y2="-25" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-45" x2="-25" y2="-25" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-45" x2="25" y2="-25" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="115" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.1"/>
  </g>
  
  <!-- Text: Context OS -->
  <text x="320" y="115" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">
    Context
  </text>
  <text x="620" y="115" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="url(#accentGradient)" letter-spacing="-2">
    OS
  </text>
  
  <!-- Tagline -->
  <text x="320" y="160" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#a1a1aa" font-weight="400">
    Context Infrastructure for AI Agents
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(320, 190)">
    <!-- Memory badge -->
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="#22c55e" stroke-width="1"/>
    <text x="40" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#22c55e" font-weight="500" text-anchor="middle">
      Memory
    </text>
    
    <!-- Search badge -->
    <rect x="90" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="#3b82f6" stroke-width="1"/>
    <text x="130" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#3b82f6" font-weight="500" text-anchor="middle">
      Search
    </text>
    
    <!-- Crawl badge -->
    <rect x="180" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="#f59e0b" stroke-width="1"/>
    <text x="220" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#f59e0b" font-weight="500" text-anchor="middle">
      Crawl
    </text>
    
    <!-- Knowledge badge -->
    <rect x="270" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="315" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#8b5cf6" font-weight="500" text-anchor="middle">
      Knowledge
    </text>
    
    <!-- MCP badge -->
    <rect x="370" y="0" width="60" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="#ec4899" stroke-width="1"/>
    <text x="400" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#ec4899" font-weight="500" text-anchor="middle">
      MCP
    </text>
  </g>
  
  <!-- Version badge -->
  <rect x="320" y="235" width="70" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="355" y="255" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#22c55e" font-weight="600" text-anchor="middle">
    v0.1.0
  </text>
  
  <!-- Open Source badge -->
  <rect x="405" y="235" width="120" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="#818cf8" stroke-width="1.5"/>
  <text x="465" y="255" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#a5b4fc" font-weight="600" text-anchor="middle">
    Open Source
  </text>
  
  <!-- MIT License badge -->
  <rect x="540" y="235" width="100" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="255" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#fbbf24" font-weight="600" text-anchor="middle">
    MIT License
  </text>
  
  <!-- Decorative dots -->
  <circle cx="1100" cy="50" r="4" fill="#818cf8" opacity="0.6"/>
  <circle cx="1120" cy="70" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="1140" cy="40" r="5" fill="#c084fc" opacity="0.4"/>
  <circle cx="1160" cy="80" r="2" fill="#818cf8" opacity="0.6"/>
  <circle cx="1080" cy="90" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="1050" cy="60" r="2" fill="#c084fc" opacity="0.3"/>
</svg>