<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#23272a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c2f33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#23272a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5865F2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7289DA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99AAB5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="960" height="540" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="960" height="540" fill="url(#grid)"/>
  
  <!-- Decorative glow -->
  <circle cx="480" cy="270" r="300" fill="#5865F2" opacity="0.05"/>
  
  <!-- Brain/Memory Network Icon -->
  <g transform="translate(480, 240)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.7"/>
    
    <!-- Main nodes -->
    <circle cx="-45" cy="-45" r="24" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="45" cy="-45" r="24" fill="url(#iconGradient)" opacity="0.95"/>
    <circle cx="0" cy="35" r="24" fill="url(#iconGradient)" opacity="0.95"/>
    
    <!-- Secondary nodes -->
    <circle cx="-80" cy="10" r="15" fill="rgba(255,255,255,0.7)"/>
    <circle cx="80" cy="10" r="15" fill="rgba(255,255,255,0.7)"/>
    <circle cx="0" cy="-80" r="15" fill="rgba(255,255,255,0.7)"/>
    
    <!-- Connection lines -->
    <line x1="-45" y1="-45" x2="45" y2="-45" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <line x1="45" y1="-45" x2="0" y2="35" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <line x1="0" y1="35" x2="-45" y2="-45" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    
    <line x1="-80" y1="10" x2="-45" y2="-45" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="80" y1="10" x2="45" y2="-45" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="0" y1="-80" x2="-45" y2="-45" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="0" y1="-80" x2="45" y2="-45" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="rgba(88,101,242,0.3)" stroke-width="2"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(88,101,242,0.15)" stroke-width="2"/>
  </g>
  
  <!-- Text: Context OS -->
  <text x="480" y="400" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">
    Context OS
  </text>
  
  <!-- Subtitle -->
  <text x="480" y="440" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#99AAB5" text-anchor="middle">
    Context Infrastructure for AI Agents
  </text>
  
  <!-- Discord badge -->
  <rect x="400" y="460" width="160" height="32" rx="16" fill="#5865F2"/>
  <text x="480" y="481" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">
    Join our Discord
  </text>
</svg>