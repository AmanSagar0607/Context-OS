[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-core"
version = "0.1.0"
description = "Core business logic for ContextOS"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.100.0",
    "pydantic>=2.0.0",
    "psycopg[binary]>=3.1.0",
    "httpx>=0.24.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]
