name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/context-core[dev]"
          pip install -e "sdk/python[dev]"
          pip install -e "cli[dev]"
      
      - name: Run context-core tests
        run: |
          cd packages/context-core
          python -m pytest tests/ -v
      
      - name: Run Python SDK tests
        run: |
          cd sdk/python
          python -m pytest tests/ -v
      
      - name: Run CLI tests
        run: |
          cd cli
          python -m pytest tests/ -v

  typescript-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: |
          cd sdk/typescript
          npm install
      
      - name: Run TypeScript SDK tests
        run: |
          cd sdk/typescript
          npm test

  server-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: app-agent
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/context-core[dev]"
      
      - name: Run server tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app-agent
        run: |
          cd apps/server
          python -m pytest tests/ -v